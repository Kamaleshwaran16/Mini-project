<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>ANALYDWO Chatbot</title>
<link rel="stylesheet" href="css/style.css">

<style>

body{
background: radial-gradient(circle at top,#0a1a2f,#020617);
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.chat-container{
width:500px;
background:#071028;
border-radius:15px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.chat-title{
text-align:center;
font-size:22px;
margin-bottom:15px;
color:#4fc3f7;
}

.chat-box{
height:400px;
overflow-y:auto;
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:15px;
margin-bottom:10px;
}

.user{
text-align:right;
color:#4fc3f7;
margin:10px 0;
}

.bot{
text-align:left;
color:#e0e7ff;
margin:10px 0;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

.chat-input button{
padding:10px 20px;
border:none;
background:#4f7cff;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>


<body>

<div class="chat-container">

<div class="chat-title">
ANALYDWO Data Assistant
</div>

<div id="chatBox" class="chat-box"></div>

<div class="chat-input">

<input id="question" placeholder="Ask about your dataset...">

<button onclick="sendQuestion()">Send</button>

</div>

</div>


<script>

const API_URL = "https://mini-project-35ij.onrender.com"


async function sendQuestion(){

let input = document.getElementById("question")
let chatBox = document.getElementById("chatBox")

let question = input.value.trim()

if(question === "") return

chatBox.innerHTML += `<div class="user">${question}</div>`

input.value=""

try{

let response = await fetch(API_URL + "/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
question:question
})

})

let data = await response.json()

chatBox.innerHTML += `<div class="bot">${data.answer}</div>`

chatBox.scrollTop = chatBox.scrollHeight

}
catch{

chatBox.innerHTML += `<div class="bot">Server error. Please try again.</div>`

}

}


/* ENTER KEY SUPPORT */

document.getElementById("question").addEventListener("keypress",function(e){

if(e.key === "Enter"){
sendQuestion()
}

})

</script>

</body>
</html>
