<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANALYDWO AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background: radial-gradient(circle at top,#0f2a44,#020617);
color:white;
padding:40px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
color:#4cc9ff;
}

.buttons{
text-align:center;
margin-bottom:30px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#4cc9ff;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b1c34;
padding:20px;
border-radius:10px;
text-align:center;
}

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:20px;
}

.chart-box{
background:#0b1c34;
padding:20px;
border-radius:10px;
}

.insights{
margin-top:40px;
}

</style>

</head>


<body>

<div class="title">ANALYDWO AI Data Analytics Dashboard</div>

<div class="buttons">
<button onclick="loadReport()">Load AI Report</button>
<button onclick="downloadReport()">Download Report</button>
</div>

<div class="cards">

<div class="card">
<h3>Total Rows</h3>
<p id="rows">--</p>
</div>

<div class="card">
<h3>Total Columns</h3>
<p id="cols">--</p>
</div>

<div class="card">
<h3>Dataset Status</h3>
<p>Cleaned</p>
</div>

<div class="card">
<h3>AI Engine</h3>
<p>Active</p>
</div>

</div>


<div class="charts">

<div class="chart-box">
<h3>Average Values</h3>
<canvas id="avgChart"></canvas>
</div>

<div class="chart-box">
<h3>Distribution</h3>
<canvas id="distChart"></canvas>
</div>

</div>


<div class="insights">

<h3>AI Insights</h3>
<ul id="insights"></ul>

<h3>AI Generated Explanation</h3>
<p id="explanation">
AI summary will appear here after loading report.
</p>

</div>


<script>

const API_URL = "https://mini-project-35ij.onrender.com"

let avgChart = null
let distChart = null


async function loadReport(){

try{

let res = await fetch(API_URL + "/analyze")
let data = await res.json()

document.getElementById("rows").innerText = data.rows
document.getElementById("cols").innerText = data.columns


let labels = Object.keys(data.averages)
let values = Object.values(data.averages)


/* Destroy old charts if reloaded */

if(avgChart) avgChart.destroy()
if(distChart) distChart.destroy()


avgChart = new Chart(document.getElementById("avgChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Average Values",
data:values,
backgroundColor:"#4cc9ff"
}]
}
})


distChart = new Chart(document.getElementById("distChart"),{
type:"pie",
data:{
labels:labels,
datasets:[{
data:values
}]
}
})


let insights=document.getElementById("insights")
insights.innerHTML=""

labels.forEach((l,i)=>{
insights.innerHTML+=`<li>Average ${l} is ${values[i]}</li>`
})


document.getElementById("explanation").innerText =
`The dataset contains ${data.rows} records and ${data.columns} columns. 
Average values were calculated for numerical fields. 
These insights help understand the distribution and trends in the dataset.`

}
catch(err){

alert("Failed to load analysis report")

}

}



async function downloadReport(){

let res = await fetch(API_URL + "/report")
let data = await res.json()

let blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "analysis_report.json"
a.click()

}

</script>

</body>
</html>
